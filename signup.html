<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Card styling with entrance animation */
        .signup-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-card h2 {
            color: #1e293b;
            font-size: 1.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 24px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            background: transparent;
            transition: all 0.25s ease;
        }

        /* SVG Vector Icon Styling */
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #94a3b8;
            stroke-width: 2;
            transition: all 0.25s ease;
            pointer-events: none;
        }

        /* Input Micro-interactions on Focus */
        .input-wrapper input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        .input-wrapper input:focus + .input-icon {
            stroke: #6366f1;
            transform: translateY(-50%) scale(1.1);
        }

        /* Checkbox row styling */
        .terms-option {
            display: flex;
            align-items: flex-start;
            font-size: 0.85rem;
            color: #475569;
            margin-top: 4px;
            margin-bottom: 24px;
            cursor: pointer;
            line-height: 1.4;
        }

        .terms-option input {
            margin-top: 2px;
            margin-right: 8px;
            accent-color: #6366f1;
            cursor: pointer;
        }

        .terms-option a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }

        .terms-option a:hover {
            text-decoration: underline;
        }

        /* Submit Button Styling */
        .submit-btn {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 13px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .submit-btn:hover {
            background: #4f46e5;
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        /* Form Redirect Footer */
        .footer-text {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-top: 24px;
        }

        .footer-text a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h2>Create Account</h2>
        <p class="subtitle">Get started with your new account</p>
        
        <form onsubmit="event.preventDefault(); alert('Sign Up Submission Logged.');">
            
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <input type="text" required placeholder="John Doe">
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <input type="email" required placeholder="name@example.com">
                    <svg class="input-icon" viewBox="0 0 24 24">

                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
            </div>

                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password"
