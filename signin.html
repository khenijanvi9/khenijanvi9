<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Card styling with initial loading animation */
        .signin-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signin-card h2 {
            color: #1e293b;
            font-size: 1.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 28px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            background: transparent;
            transition: all 0.25s ease;
        }

        /* SVG Vector Icon Styling */
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #94a3b8;
            stroke-width: 2;
            transition: all 0.25s ease;
            pointer-events: none;
        }

        /* Input Micro-interactions on Focus */
        .input-wrapper input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        .input-wrapper input:focus + .input-icon {
            stroke: #6366f1;
            transform: translateY(-50%) scale(1.1);
        }

        /* Row Layout for Checkbox & Password Reset Links */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-top: -4px;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #475569;
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 6px;
            accent-color: #6366f1;
            cursor: pointer;
        }

        .forgot-link {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Submit Button Styling */
        .submit-btn {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 13px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .submit-btn:hover {
            background: #4f46e5;
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        /* Form Redirect Footer */
        .footer-text {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-top: 24px;
        }

        .footer-text a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="signin-card">
        <h2>Sign In</h2>
        <p class="subtitle">Access your dashboard profile</p>
        
        <form onsubmit="event.preventDefault(); alert('Sign In Attempt Confirmed.');">
            
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <input type="email" required placeholder="name@example.com">
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" required placeholder="••••••••">
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>

        <div class="footer-text">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>

</body>
</html>
