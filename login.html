<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Portal</title>
    <style>
        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background Floating Circles Animation */
        .bg-circles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .circle {
            position: absolute;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .circle-1 { width: 300px; height: 300px; top: -10%; left: -10%; animation-duration: 25s; }
        .circle-2 { width: 400px; height: 400px; bottom: -20%; right: -10%; animation-duration: 30s; }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-30px) rotate(180deg) scale(1.05); }
            100% { transform: translateY(0) rotate(360deg) scale(1); }
        }

        /* Entrance Animation for the Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h2 {
            color: #1e293b;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 32px;
        }

        /* Input Group & Micro-interactions */
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #1e293b;
            outline: none;
            background: transparent;
            transition: all 0.3s ease;
        }

        /* SVG Icon styling inside input */
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #94a3b8;
            stroke-width: 2;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* Focused input animation states */
        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* Micro-interaction: Icon springs up slightly and changes color on focus */
        .input-group input:focus + .input-icon {
            stroke: #6366f1;
            transform: translateY(-50%) scale(1.15);
        }

        /* Submit Button Hover Animation Effects */
        .submit-btn {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:hover {
            background: #4f46e5;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        /* Extra details styling */
        .footer-links {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        .footer-links a {
            color: #6366f1;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #4f46e5;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="bg-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to continue</p>
        
        <form onsubmit="event.preventDefault(); handleLogin();">
            <div class="input-group">
                <input type="email" required placeholder="Email Address">
                <svg class="input-icon" viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            </div>
            
            <div class="input-group">
                <input type="password" required placeholder="Password">
                <svg class="input-icon" viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <button type="submit" class="submit-btn" id="btn-text">Sign In</button>
        </form>

        <div class="footer-links">
            <a href="#">Forgot password?</a>
            <a href="#">Create account</a>
        </div>
    </div>

    <script>
        // Optional JavaScript to handle a quick temporary submission success state animation
        function handleLogin() {
            const btn = document.getElementById('btn-text');
            btn.style.pointerEvents = 'none';
            btn.style.background = '#10b981'; // Dynamic switch to emerald green on success
            btn.innerText = 'Success!';
            
            setTimeout(() => {
                alert('Authentication system acknowledged request!');
                btn.style.pointerEvents = 'auto';
                btn.style.background = '#6366f1';
                btn.innerText = 'Sign In';
            }, 600);
        }
    </script>
</body>
</html>
